<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer — NEB Archive</title>
    <meta name="description" content="View NEB exam papers and study materials.">

    <script>
        (function() {
            const t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Hanken+Grotesk:wght@350;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Both loaded as plain global scripts, no modules -->
    <script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module" id="pdfjs-preload"></script>

    <link rel="stylesheet" href="CSS/style(viewer).css">
</head>
<body>

    <header class="navbar" id="navbar">
        <div class="nav-inner">
            <a href="pyqs.html" class="back-btn" aria-label="Back to PYQs">
                <i data-lucide="arrow-left"></i>
                <span>Back</span>
            </a>
            <div class="paper-meta-bar">
                <span class="paper-badge" id="sourceBadge">NEB Official</span>
                <h1 class="paper-title-nav" id="paperTitleNav">Loading…</h1>
            </div>
            <button id="themeToggle" class="icon-btn" aria-label="Toggle dark mode">
                <i class="i-sun" data-lucide="sun"></i>
                <i class="i-moon" data-lucide="moon"></i>
            </button>
        </div>
    </header>

    <div class="toolbar" id="toolbar" role="toolbar" aria-label="PDF controls">
        <div class="toolbar-group">
            <button class="tool-btn" id="prevPage" aria-label="Previous page" title="Previous page"><i data-lucide="chevron-up"></i></button>
            <div class="page-indicator">
                <input type="number" id="pageInput" min="1" value="1" aria-label="Current page">
                <span class="page-sep">/</span>
                <span id="totalPages">—</span>
            </div>
            <button class="tool-btn" id="nextPage" aria-label="Next page" title="Next page"><i data-lucide="chevron-down"></i></button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <button class="tool-btn" id="zoomOut" title="Zoom out"><i data-lucide="zoom-out"></i></button>
            <button class="zoom-display" id="zoomDisplay" title="Reset zoom">100%</button>
            <button class="tool-btn" id="zoomIn" title="Zoom in"><i data-lucide="zoom-in"></i></button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <button class="tool-btn fit-btn active" id="fitPage" title="Fit page" data-fit="page"><i data-lucide="expand"></i></button>
            <button class="tool-btn fit-btn" id="fitWidth" title="Fit width" data-fit="width"><i data-lucide="arrow-left-right"></i></button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <button class="tool-btn" id="fullscreenBtn" title="Fullscreen"><i data-lucide="maximize-2"></i></button>
        </div>
    </div>

    <main class="viewer-main" id="viewerMain">
        <div class="loader-shell" id="loaderShell">
            <div class="loader-ring"></div>
            <p class="loader-text">Loading paper…</p>
        </div>
        <div class="error-shell" id="errorShell" style="display:none">
            <i data-lucide="file-x-2"></i>
            <strong>Couldn't load this paper</strong>
            <p>The file may not be available yet or the link is broken.</p>
            <a href="pyqs.html" class="error-back">← Back to PYQs</a>
        </div>
        <div class="canvas-scroll" id="canvasScroll" hidden>
            <div class="pages-wrap" id="pagesWrap"></div>
        </div>
    </main>

    <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

    <!-- viewer.js is a module so it can import PDF.js -->
    <script type="module" src="JS/viewer.js"></script>
</body>
</html>
