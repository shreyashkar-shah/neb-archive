<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewing PDF — NEB Archive</title>

    <!-- Prevent FOUC (Flash of Unstyled Content) for Dark Mode -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Local stylesheet -->
    <link rel="stylesheet" href="CSS/style(viewer).css">

    <!-- PDF.js Library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="viewer-body">

    <!-- ==================== VIEWER TOP BAR ==================== -->
    <header class="viewer-topbar">
        <div class="viewer-left">
            <!-- Back Button is now First (Far Left) -->
            <a href="#" id="viewer-back-btn" class="viewer-back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back
            </a>
            <!-- Sidebar Toggle is now Second -->
            <button id="sidebar-toggle" class="icon-btn" title="Toggle Pages">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
            </button>
            <div class="viewer-title-wrapper">
                <span class="viewer-badge">PDF</span>
                <h1 id="pdf-title">Loading Document...</h1>
            </div>
        </div>

        <div class="viewer-controls">
            <button id="zoom-out" class="icon-btn" title="Zoom Out">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
            </button>
            <span id="zoom-level">100%</span>
            <button id="zoom-in" class="icon-btn" title="Zoom In">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
            </button>
            
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode" style="margin-left: 12px;">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
            </button>
        </div>
    </header>

    <!-- ==================== VIEWER LAYOUT ==================== -->
    <div class="viewer-layout">
        
        <!-- ==================== SIDEBAR (Thumbnails) ==================== -->
        <aside class="pdf-sidebar" id="pdf-sidebar">
            <div class="sidebar-header">
                <span>Pages</span>
                <span id="page-indicator">0 / 0</span>
            </div>
            <div class="thumbnail-list" id="thumbnail-list">
                <!-- Thumbnails injected by JS -->
            </div>
        </aside>

        <!-- ==================== PDF RENDER AREA ==================== -->
        <main class="pdf-container" id="pdf-container">
            <!-- PDF.js will inject <canvas> elements here -->
            <div class="loading-spinner" id="loading-spinner">
                <div class="spinner"></div>
                <p>Fetching document...</p>
            </div>
        </main>

    </div>

    <script src="JS/viewer.js"></script>
</body>
</html>
