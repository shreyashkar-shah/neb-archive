<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1530"/>
      <stop offset="100%" style="stop-color:#0C0A14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B7FFF"/>
      <stop offset="100%" style="stop-color:#6C47FF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Stack of 3 books / layers — mirrors library-big icon concept -->
  <!-- Bottom layer -->
  <rect x="96" y="310" width="320" height="52" rx="14" fill="url(#accent)" opacity="0.45"/>
  <!-- Middle layer -->
  <rect x="116" y="248" width="280" height="52" rx="14" fill="url(#accent)" opacity="0.70"/>
  <!-- Top layer -->
  <rect x="136" y="186" width="240" height="52" rx="14" fill="url(#accent)"/>

  <!-- Subtle spine line on top layer -->
  <rect x="184" y="186" width="4" height="52" rx="2" fill="#ffffff" opacity="0.25"/>

  <!-- "N" letterform on top layer -->
  <text x="256" y="228" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="42" 
        font-weight="700" 
        fill="#ffffff" 
        text-anchor="middle" 
        dominant-baseline="middle"
        letter-spacing="-1">NEB</text>
</svg>
